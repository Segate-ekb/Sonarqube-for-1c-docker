version: "2"
services:
  postgresql:
    restart: always
    image: postgres:17
    networks:
      - sonarnetwork
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
    volumes:
      - postgresql:/var/lib/postgresql
      - postgresql_data:/var/lib/postgresql/data
  sonar:
    restart: always
    image: daabramov/sonarfor1c:26.5-community
    ports:
      - "32772:9000"
    depends_on:
      - postgresql
    ulimits:
     nofile:
      soft: 65535
      hard: 65535 
    networks:
      - sonarnetwork
    environment:
      - SONAR_WEB_JAVAOPTS=-server -Xms1g -Xmx2g -XX:+HeapDumpOnOutOfMemoryError
      - SONAR_CE_JAVAOPTS=-Xms4g -Xmx4g -XX:+HeapDumpOnOutOfMemoryError
      - SONAR_SEARCH_JAVAOPTS=-Xms2g -Xmx2g -XX:+HeapDumpOnOutOfMemoryError
      - SONAR_JDBC_URL=jdbc:postgresql://postgresql:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_conf:/opt/sonarqube/conf
      - sonarqube_data:/opt/sonarqube/data
      # Хранилище плагинов: переживает смену версии образа. Сюда можно и класть jar-ы руками,
      # и сюда же сохраняются плагины, поставленные через Marketplace.
      # Монтируйте чем удобнее - именованным томом или каталогом с хоста:
      #   - ./plugins:/opt/sonarqube/extensions/custom-plugins
      - sonarqube_plugins:/opt/sonarqube/extensions/custom-plugins
      # Каталог /opt/sonarqube/extensions монтировать НЕЛЬЗЯ: он перекроет плагины из образа.
      - sonarqube_downloads:/opt/sonarqube/extensions/downloads
networks:
  sonarnetwork:
    driver: bridge
volumes:
  sonarqube_conf:
  sonarqube_data:
  sonarqube_plugins:
  sonarqube_downloads:
  postgresql:
  postgresql_data:
